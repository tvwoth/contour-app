services:
  app:
    build: .
    container_name: contour-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_PORT=${APP_PORT}
    expose:
      - "${APP_PORT}"
    networks:
      - contour-net
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:${APP_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:stable-alpine
    container_name: contour-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - contour-net

networks:
  contour-net:
    driver: bridge

